<!DOCTYPE html>  
<html lang="en">  
<head>  
<meta charset="UTF-8">  
<meta name="viewport" content="width=device-width, initial-scale=1.0">  
<title>Happy Birthday 🎉</title>  

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">  

<style>  
* {  
  margin: 0;  
  padding: 0;  
  box-sizing: border-box;  
  font-family: 'Poppins', sans-serif;  
}  

body {  
  height: 100vh;  
  background: linear-gradient(135deg, #ffd6e8, #ffeaea);  
  display: flex;  
  justify-content: center;  
  align-items: center;  
  overflow: hidden;  
}  

/* ===== LOADER ===== */
.loader {
  position: fixed;
  width: 100%;
  height: 100%;
  background: linear-gradient(135deg, #ffd6e8, #ffeaea);
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 9999;
}

.loader h1 {
  color: #ff4d6d;
  margin-top: 15px;
}

.spinner {
  width: 50px;
  height: 50px;
  border: 5px solid #fff;
  border-top: 5px solid #ff4d6d;
  border-radius: 50%;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  100% { transform: rotate(360deg); }
}

/* Floating hearts */  
.heart {  
  position: absolute;  
  color: #ff4d6d;  
  font-size: 20px;  
  animation: floatUp 6s linear infinite;  
  opacity: 0.7;  
}  

@keyframes floatUp {  
  0% { transform: translateY(100vh) scale(0.5); opacity: 0; }  
  50% { opacity: 1; }  
  100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }  
}  

/* Card */  
.card {  
  background: rgba(255,255,255,0.8);  
  backdrop-filter: blur(10px);  
  border-radius: 20px;  
  padding: 40px;  
  text-align: center;  
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);  
  animation: fadeIn 2s ease;  
}  

@keyframes fadeIn {  
  from { opacity: 0; transform: translateY(30px);}  
  to { opacity: 1; transform: translateY(0);}  
}  

h1 {  
  font-size: 2.5rem;  
  color: #ff4d6d;  
  margin-bottom: 10px;  
}  

h2 {  
  font-weight: 300;  
  margin-bottom: 20px;  
}  

.message {  
  font-size: 1rem;  
  color: #555;  
  margin-bottom: 25px;  
}  

/* Button */  
button {  
  padding: 10px 20px;  
  border: none;  
  border-radius: 25px;  
  background: #ff4d6d;  
  color: white;  
  font-size: 1rem;  
  cursor: pointer;  
  transition: 0.3s;  
}  

button:hover {  
  background: #e63956;  
  transform: scale(1.05);  
}  

/* Hidden surprise */  
.surprise {  
  display: none;  
  margin-top: 20px;  
  font-size: 1.2rem;  
  color: #ff4d6d;  
  animation: pop 0.5s ease;  
}  

@keyframes pop {  
  from { transform: scale(0); }  
  to { transform: scale(1); }  
}  
</style>  
</head>  

<body>  

<!-- LOADER -->
<div class="loader" id="loader">
  <div class="spinner"></div>
  <h1>Loading...</h1>
</div>

<!-- Floating hearts -->  
<script>  
for(let i=0;i<25;i++){  
  let heart=document.createElement("div");  
  heart.className="heart";  
  heart.innerHTML="❤";  
  heart.style.left=Math.random()*100+"vw";  
  heart.style.animationDuration=(3+Math.random()*5)+"s";  
  heart.style.fontSize=(15+Math.random()*25)+"px";  
  document.body.appendChild(heart);  
}  
</script>  

<div class="card">  
  <h1>🎂 Happy Birthday!</h1>  
  <h2>Dear <span id="name">Friend</span></h2>  
    
  <p class="message">  
    Wishing you a day filled with love, joy, and happiness.    
    May all your dreams come true and your smile shine forever ✨  
  </p>  

  <button onclick="showSurprise()">Click for Surprise 🎁</button>  

  <div class="surprise" id="surprise">  
    🎉 You are amazing! Stay blessed always 💖  
  </div>  
</div>  

<script>  
function showSurprise(){  
  document.getElementById("surprise").style.display="block";  
}

/* LOADER → REDIRECT */
window.onload = function() {
  setTimeout(function(){
    window.location.href = "main.html";
  }, 3000); // 3 seconds
};
</script>  

</body>  
</html>
